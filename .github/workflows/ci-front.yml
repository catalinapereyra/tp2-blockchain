name: Front

on:
  push:
    branches: [main]
    paths:
      - "web/front/**"
  pull_request:
    branches: [main]
    paths:
      - "web/front/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: web/front/package-lock.json

      - name: Install dependencies
        working-directory: web/front
        run: npm ci

      - name: Build
        working-directory: web/front
        run: npm run build
